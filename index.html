<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>WordFlow</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="app">

<header>

    <h1>
        📚 WordFlow
    </h1>


    <p>
        Твой тренажёр английских слов
    </p>


    <div class="stats">

        Всего слов:

        <strong id="wordCount">
            0
        </strong>

    </div>
    <div class="today-stats">


    <h3>
        Сегодня
    </h3>


    <div>
        🔁 К повторению:
        <strong id="reviewCount">
            0
        </strong>
    </div>


    <div>
        ⭐ Новых слов:
        <strong id="newCount">
            0
        </strong>
    </div>


</div>

</header>


<main>

<section class="card">

<h2 id="word">
Добро пожаловать
</h2>


<input 
id="answer"
type="text"
placeholder="Введите перевод"
autocomplete="off"
/>


<button id="check">
Проверить
</button>
    <div id="difficultyButtons"
class="difficulty-buttons"
style="display:none;">


    <p>
        Как было?
    </p>


    <button id="hard">
        😰 Сложно
    </button>


    <button id="normal">
        🙂 Нормально
    </button>


    <button id="easy">
        😎 Легко
    </button>


</div>


<p id="result"></p>

</section>



<section class="card">

<h3>📖 Мои слова</h3>

<input 
id="searchWords"
type="text"
placeholder="Поиск слова..."
/>


<div id="wordsList"></div>

</section>

<section class="card">

<h3>Импорт слов</h3>

<p>
Формат:
<br>
apple - яблоко
<br>
run - бегать
</p>


<textarea 
id="importWords"
placeholder="Вставь свои слова сюда">
</textarea>


<button id="importButton">
Добавить слова
</button>


</section>


</main>


<footer>

<p>
WordFlow v0.1
</p>

</footer>


</div>


<!-- Окно редактирования слова -->

<div id="editModal" class="modal">


    <div class="modal-content">


        <h3>
            ✏️ Редактировать слово
        </h3>


        <label>
            Английское слово
        </label>

        <input 
        id="editEnglish"
        type="text"
        >



        <label>
            Перевод
        </label>

        <input 
        id="editRussian"
        type="text"
        >



        <button id="saveEdit">
            Сохранить
        </button>


        <button id="cancelEdit" class="cancel">
            Отмена
        </button>


    </div>


</div>

<script src="scheduler.js"></script>

<script src="app.js"></script>

</body>
</html>
