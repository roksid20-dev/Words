<!DOCTYPE html>
<html lang="ru">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>WordFlow</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<div class="app">


<header>

<h1>WordFlow</h1>

<p>Изучение слов</p>

</header>





<section class="bulk-add">

<h2>Массовое добавление</h2>

<textarea
    id="bulkInput"
    rows="8"
    placeholder="cat - кот
dog; собака
book книга"
></textarea>

<button id="bulkAddButton">
    Добавить список
</button>

</section>

<section 
    class="edit-word"
    id="editWordSection"
    style="display:none;"
>

<h2>Изменить слово</h2>

<input
id="editEnglishInput"
type="text"
placeholder="English"
/>


<input
id="editRussianInput"
type="text"
placeholder="Русский"
/>


<button id="saveEditButton">
    Сохранить
</button>


<button id="cancelEditButton">
    Отмена
</button>


</section>
    
<section class="search">


<input
id="searchInput"
type="text"
placeholder="Поиск слова"
/>


</section>




<section class="words">


<h2>
Мои слова
</h2>


<div id="wordsList">

</div>


</section>
  <section class="training">


<h2>
Тренировка
</h2>


<button id="startTrainingButton">
Начать тренировку
</button>



<div id="trainingArea">


<h3 id="wordElement">

</h3>



<input
id="answerInput"
type="text"
placeholder="Введите перевод"
/>



<button id="checkButton">
Проверить
</button>



<p id="resultElement">

</p>


</div>


</section>


</div>



<script src="js/model.js"></script>

<script src="js/storage.js"></script>

<script src="js/words.js"></script>

<script src="js/algorithm.js"></script>

<script src="js/training.js"></script>

<script src="js/app.js"></script>






</body>

</html>

document
    .getElementById(
        "startTrainingButton"
    )
    .addEventListener(
        "click",
        startTraining
    );


checkButton.addEventListener(
    "click",
    checkAnswer
);
